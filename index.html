<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForexKYC — Login</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5zm-1 3v4h2V8h-2zm0 6v2h2v-2h-2z"/></svg>
      </div>
      <h1>ForexKYC Portal</h1>
      <p>Compliance &amp; Identity Verification Platform</p>
    </div>

    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your KYC dashboard</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="officer@forexbroker.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="form-options">
          <label class="check-label">
            <input type="checkbox" id="remember"> Remember me
          </label>
          <a href="#" class="link-muted">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      </form>

      <div class="divider">or</div>

      <p class="auth-footer" style="margin-top:0">
        Don't have an account? <a href="signup.html">Create one</a>
      </p>
    </div>

    <p class="auth-copyright">&copy; 2026 ForexKYC Portal &mdash; Secure Compliance System</p>
  </div>

  <script>
    // Apply saved theme
    if (localStorage.getItem('kyc_theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn      = document.getElementById('loginBtn');

      if (!email || !password) {
        errorMsg.textContent = 'Please enter your email and password.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      setTimeout(function() {
        sessionStorage.setItem('kyc_logged_in', '1');
        sessionStorage.setItem('kyc_user_email', email);
        window.location.href = 'pages/dashboard.html';
      }, 700);
    });

    ['email','password'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        document.getElementById('errorMsg').style.display = 'none';
      });
    });
  </script>
</body>
</html>
