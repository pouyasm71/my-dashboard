<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForexKYC — Sign Up</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5zm-1 3v4h2V8h-2zm0 6v2h2v-2h-2z"/></svg>
      </div>
      <h1>ForexKYC Portal</h1>
      <p>Compliance &amp; Identity Verification Platform</p>
    </div>

    <div class="auth-card">
      <h2>Create your account</h2>
      <p class="subtitle">Register as a KYC compliance officer</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="signupForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="John" autocomplete="given-name">
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Smith" autocomplete="family-name">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="officer@forexbroker.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="department">Department / Branch</label>
          <input type="text" id="department" placeholder="Compliance — EMEA" autocomplete="organization">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <div class="form-options" style="margin-bottom:18px">
          <label class="check-label">
            <input type="checkbox" id="terms">
            I agree to the <a href="#" style="color:var(--primary)">Terms of Service</a>
          </label>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="index.html">Sign in</a></p>
    </div>

    <p class="auth-copyright">&copy; 2026 ForexKYC Portal &mdash; Secure Compliance System</p>
  </div>

  <script src="scripts/config.js"></script>
  <script>
    if (localStorage.getItem('kyc_theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const firstName  = document.getElementById('firstName').value.trim();
      const lastName   = document.getElementById('lastName').value.trim();
      const email      = document.getElementById('email').value.trim();
      const department = document.getElementById('department').value.trim();
      const password   = document.getElementById('password').value;
      const confirm    = document.getElementById('confirm').value;
      const terms      = document.getElementById('terms').checked;
      const btn        = document.getElementById('registerBtn');

      if (!firstName || !lastName) return showError('Please enter your full name.');
      if (!email || !email.includes('@')) return showError('Please enter a valid email address.');
      if (!department) return showError('Please enter your department.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');
      if (password !== confirm) return showError('Passwords do not match.');
      if (!terms) return showError('You must agree to the Terms of Service.');

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const res  = await fetch(API_BASE + '/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name:     firstName + ' ' + lastName,
            email,
            password,
            role:     department.toLowerCase().replace(/\s+/g, '_'),
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Registration failed. Please try again.');
          btn.textContent = 'Create Account';
          btn.disabled = false;
          return;
        }
        sessionStorage.setItem('kyc_logged_in', '1');
        sessionStorage.setItem('kyc_user_name',  data.user.name);
        sessionStorage.setItem('kyc_user_role',  data.user.role);
        window.location.href = 'pages/dashboard.html';
      } catch (err) {
        showError('Unable to reach the server. Is the backend running?');
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
